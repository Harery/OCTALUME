services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OCTALUME_STATE_DIR=/data/.octalume
      - OCTALUME_REDIS_URL=redis://redis:6379/0
      - OCTALUME_LOG_LEVEL=INFO
    volumes:
      - octalume-data:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./web/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A octalume.worker worker --loglevel=info
    environment:
      - OCTALUME_STATE_DIR=/data/.octalume
      - OCTALUME_REDIS_URL=redis://redis:6379/0
      - OCTALUME_LOG_LEVEL=INFO
    volumes:
      - octalume-data:/data
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  octalume-data:
  redis-data:
